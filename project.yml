name: Vivacity
options:
  minimumXcodeGenVersion: 2.44.0
  deploymentTarget:
    macOS: 14.0
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.0
    GENERATE_INFOPLIST_FILE: YES
    MACOSX_DEPLOYMENT_TARGET: 14.0
configs:
  Debug: debug
  Release: release
targets:
  Vivacity:
    type: application
    platform: macOS
    sources:
      - path: Vivacity
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joao.Vivacity
        PRODUCT_NAME: Vivacity
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_ENTITLEMENTS: Vivacity/Vivacity.entitlements
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_EMIT_LOC_STRINGS: YES
    preBuildScripts:
      - name: SwiftLint
        script: |
          cd "${SRCROOT}"
          export PATH="$PATH:/opt/homebrew/bin"
          if which swiftlint >/dev/null; then
            swiftlint
          else
            echo "warning: SwiftLint not installed, download from https://github.com/realm/SwiftLint"
          fi
          touch "${DERIVED_FILE_DIR}/swiftlint.done"
        outputFiles:
          - $(DERIVED_FILE_DIR)/swiftlint.done

  VivacityTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: VivacityTests
    dependencies:
      - target: Vivacity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joao.VivacityTests
        PRODUCT_NAME: VivacityTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Vivacity.app/Contents/MacOS/Vivacity
        BUNDLE_LOADER: $(TEST_HOST)

  VivacityUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: VivacityUITests
    dependencies:
      - target: Vivacity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joao.VivacityUITests
        PRODUCT_NAME: VivacityUITests

schemes:
  Vivacity:
    shared: true
    build:
      targets:
        Vivacity: all
        VivacityTests: [test]
        VivacityUITests: [test]
    test:
      gatherCoverageData: true
      targets:
        - name: VivacityTests
        - name: VivacityUITests
